name: 'Web Lab1'

on: [push]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: begin
        uses: actions/checkout@v3

      - name: setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: setup Pipenv
        run: python -m pip install pipenv

      - name: Pipenvsync
        run: python -m pipenv install --deploy --system